# Flood Risk Mapping Pipeline Configuration

info:
  name: "mumbai"
  description: "Flood risk mapping for Mumbai, India"

# Input data paths
data:
  raw_dir: "data/raw"
  inter_dir: "data/inter"
  processed_dir: "data/processed"
  dem_file: "dem_mumbai.tif"
  coastline_file: "ne_10m_coastline/ne_10m_coastline.shp"

# Pipeline parameters
pipeline:
  water_level: 2.0  # meters above reference
  coast_buffer_dist_m: 5000.0  # buffer distance around coastline in meters (null to disable)
  metric_crs: 3857  # EPSG code for area calculations (3857 = Web Mercator)

# Output file names
output:
  flood_mask_raster: "flood_mask_mumbai.tif"
  flood_polygons_vector: "flood_polygons_mumbai.geojson"
  summary_report: "flood_summary_mumbai.txt"
  vector_driver: "GeoJSON"  # Deterministic format for version control

# Visualization settings (optional)
visualization:
  dpi: 200
  figsize: [8, 6]
  flood_colormap: "Blues"
  terrain_colormap: "terrain"
  flood_alpha: 0.5
  # Output file names for visualizations
  flood_map_output: "flood_map_mumbai.png"
  debug_layers_output: "debug_layers_mumbai.png"
